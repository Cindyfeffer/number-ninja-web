<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Ninja</title>
  <style>
    :root {
      --bg: #080b1a;
      --card: #141b3d;
      --text: #f7f8ff;
      --accent: #ff7c7c;
      --accent2: #6be7ff;
      --muted: #a9b2d1;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #222754 0%, #080b1a 65%);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
    }

    .page {
      width: min(100%, 520px);
      padding: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 32px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 42%);
      pointer-events: none;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2.1rem, 3.2vw, 3rem);
      letter-spacing: -0.04em;
    }

    p.subtitle {
      margin: 0 0 26px;
      color: var(--muted);
    }

    .level {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      margin-bottom: 18px;
      align-items: center;
    }

    .controls {
      display: grid;
      gap: 14px;
    }

    input[type="number"] {
      width: 100%;
      padding: 18px 18px;
      border: none;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-size: 1.1rem;
      outline: none;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 16px;
      padding: 16px 22px;
      font-size: 1rem;
      font-weight: 700;
      color: #080b1a;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      transition: transform 0.16s ease, box-shadow 0.16s ease;
      box-shadow: 0 18px 32px rgba(255, 124, 124, 0.22);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 22px 34px rgba(255, 124, 124, 0.3);
    }

    .status {
      display: grid;
      gap: 10px;
      margin: 32px 0 0;
      padding: 22px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .status strong {
      display: inline-block;
      margin-bottom: 6px;
      color: var(--text);
    }

    .status .message {
      font-size: 1.05rem;
      color: var(--accent2);
      min-height: 1.5em;
    }

    .footer {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .footer button {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      box-shadow: none;
    }

    .confetti {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .piece {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 4px;
      opacity: 0;
      animation: drop 1.2s ease-in forwards;
    }

    @keyframes drop {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(250px) rotate(720deg); opacity: 0; }
    }

    .ninja-star {
      position: fixed;
      font-size: 3rem;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
    }

    .ninja-star.flying {
      animation: fly 1s ease-out;
    }

    @keyframes fly {
      0% { left: 50%; top: 50%; opacity: 1; transform: scale(1) rotate(0deg); }
      100% { left: 0; top: 10%; opacity: 0; transform: scale(0.5) rotate(720deg); }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="confetti" id="confetti"></div>
      <h1>Number Ninja</h1>
      <p class="subtitle">Find the secret number before the ninja strikes. No install required — just open and play.</p>

      <div class="level">
        <div>
          <label for="guessInput">Your guess</label>
          <input id="guessInput" type="number" min="1" max="10" placeholder="1-10" />
        </div>
        <button id="guessButton">Throw Ninja Star</button>
      </div>

      <div class="status">
        <div>
          <strong>Game status</strong>
          <div class="message" id="message">Ready to play! 🎮</div>
        </div>
        <div>
          <strong>Attempts</strong>
          <div id="attempts">0</div>
        </div>
      </div>

      <div class="footer">
        <button id="resetButton">New Game</button>
        <span>Range: 1–10</span>
      </div>
    </div>
  </div>

  <div class="ninja-star" id="ninjaStar">⭐</div>

  <script>
    const secretMin = 1;
    const secretMax = 10;
    const guessInput = document.getElementById('guessInput');
    const guessButton = document.getElementById('guessButton');
    const resetButton = document.getElementById('resetButton');
    const message = document.getElementById('message');
    const attemptsLabel = document.getElementById('attempts');
    const confetti = document.getElementById('confetti');

    let secretNumber = 0;
    let attempts = 0;

    function newGame() {
      secretNumber = Math.floor(Math.random() * (secretMax - secretMin + 1)) + secretMin;
      attempts = 0;
      attemptsLabel.textContent = '0';
      message.textContent = 'A new secret number has been chosen!';
      guessInput.value = '';
      guessInput.disabled = false;
      guessButton.disabled = false;
      clearConfetti();
      guessInput.focus();
    }

    function showConfetti() {
      clearConfetti();
      for (let i = 0; i < 25; i += 1) {
        const piece = document.createElement('div');
        piece.className = 'piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.background = ['#ff7c7c', '#6be7ff', '#ffd166', '#7d5fff', '#2dd4bf'][Math.floor(Math.random() * 5)];
        piece.style.animationDelay = Math.random() * 0.4 + 's';
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        confetti.appendChild(piece);
      }
      setTimeout(clearConfetti, 1500);
    }

    function clearConfetti() {
      confetti.innerHTML = '';
    }

    function checkGuess() {
      // Throw ninja star
      const star = document.getElementById('ninjaStar');
      star.classList.add('flying');
      setTimeout(() => star.classList.remove('flying'), 1000);

      const guessValue = parseInt(guessInput.value, 10);
      if (Number.isNaN(guessValue)) {
        message.textContent = 'Type a whole number between 1 and 10.';
        return;
      }
      if (guessValue < secretMin || guessValue > secretMax) {
        message.textContent = `Pick a number between ${secretMin} and ${secretMax}.`;
        return;
      }

      attempts += 1;
      attemptsLabel.textContent = attempts;

      if (guessValue < secretNumber) {
        message.textContent = 'Too low! Aim higher. 🥷';
      } else if (guessValue > secretNumber) {
        message.textContent = 'Too high! Aim lower. 🎯';
      } else {
        message.textContent = 'Correct! You nailed it! 🏆';
        guessInput.disabled = true;
        guessButton.disabled = true;
        showConfetti();
      }
    }

    guessButton.addEventListener('click', checkGuess);
    resetButton.addEventListener('click', newGame);
    guessInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        checkGuess();
      }
    });

    newGame();
  </script>
</body>
</html>
